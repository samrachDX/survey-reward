services:
  # ── Backend Web Service ──────────────────────────────────────
  - type: web
    name: survey-reward-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these manually in Render Dashboard:
      # - MONGODB_URI
      # - FRONTEND_URL
      # - GOOGLE_SERVICE_ACCOUNT_EMAIL
      # - GOOGLE_PRIVATE_KEY
      # - GOOGLE_SPREADSHEET_ID
      # - TOPUP_API_URL
      # - TOPUP_PARTNER_CODE
      # - TOPUP_BANK_CODE
      # - TOPUP_ACCOUNT_NO
      # - TOPUP_PRIVATE_KEY
      # - TOKEN_EXPIRY_HOURS
      # - TURNSTILE_SECRET_KEY (optional)

  # ── Frontend Static Site ─────────────────────────────────────
  - type: web
    name: survey-reward-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://survey-reward-backend.onrender.com
      # - REACT_APP_TURNSTILE_SITE_KEY (optional)
